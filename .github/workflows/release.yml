name: Release

# Build a distributable TimeAgent.exe whenever a tag is pushed.
# TimeAgent is a .NET 8 WPF (Windows-only) app, so this runs on a Windows runner.
on:
  push:
    tags:
      - '*'
  workflow_dispatch:        # also runnable manually from the Actions tab (build only, no release)

permissions:
  contents: write           # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          if (-not ($ver -match '^[0-9]+(\.[0-9]+){0,3}$')) { $ver = '0.0.0' }   # manual runs / non-numeric tags
          dotnet publish TimeAgent.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=$ver -o publish
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item publish/TimeAgent.exe "dist/TimeAgent-$tag.exe"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not ($ver -match '^[0-9]+(\.[0-9]+){0,3}$')) { $ver = '0.0.0' }
          & $iscc "/DAppVersion=$ver" installer/TimeAgent.iss
          Copy-Item "installer/TimeAgent-Setup-$ver.exe" dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TimeAgent-${{ github.ref_name }}
          path: dist/*.exe        # raw exe + installer

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TimeAgent ${{ github.ref_name }}
          files: dist/*.exe       # attaches both the portable exe and the installer
          generate_release_notes: true
